apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: release-agent
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ShinjukuPikachu/personal_project.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: release-agent

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
