name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest -v
      
      - name: Run Bandit security scan
        run: |
          bandit -r release_pilot api.py slackbot.py mcp_server.py -ll

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  build-and-push:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: quality

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deployment:
    name: Update deployment image
    runs-on: ubuntu-latest
    needs: build-and-push

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Calculate image tag
        id: image
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          echo "Deploying image: ${IMAGE}"

      - name: Update Kubernetes manifest
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          manifest = Path("k8s/deployment.yaml")
          image = os.environ["IMAGE"]

          lines = manifest.read_text().splitlines()
          updated = []

          for line in lines:
              if line.strip().startswith("image: ghcr.io/shinjukupikachu/personal_project:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f"{indent}image: {image}")
              else:
                  updated.append(line)

          manifest.write_text("\n".join(updated) + "\n")
          PY

      - name: Show manifest change
        run: git diff -- k8s/deployment.yaml

      - name: Create deployment update branch
        id: deploy_branch
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        shell: bash
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest already uses image ${IMAGE_TAG}."
            exit 0
          fi

          BRANCH="deploy/image-${IMAGE_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "$BRANCH"
          git add k8s/deployment.yaml
          git commit -m "chore(deploy): use image ${IMAGE_TAG}"
          git push --force-with-lease origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open deployment pull request
        if: steps.deploy_branch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.deploy_branch.outputs.branch }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        shell: bash
        run: |
          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            echo "Deployment PR already exists for ${IMAGE_TAG}."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(deploy): use image ${IMAGE_TAG}" \
              --body "Updates the Kubernetes Deployment to use the immutable image tag \`${IMAGE_TAG}\` built from commit \`${GITHUB_SHA}\`."
          fi